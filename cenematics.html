<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinematic Scroll Test</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="public/css/cinematic_scroll.css" />
  </head>
  <body>
    <section class="collage-section">
      <div class="collage-container">
        <div class="collage-item color1" data-aspect="1.3"></div>
        <div class="collage-item color2" data-aspect="0.9"></div>
        <div class="collage-item color3" data-aspect="1.7"></div>
        <div class="collage-item color4" data-aspect="1.1"></div>
        <div class="collage-item color5" data-aspect="1.4"></div>
        <div class="collage-item color6" data-aspect="1.8"></div>
        <div class="collage-item color7" data-aspect="0.7"></div>
        <div class="collage-item color8" data-aspect="1.2"></div>
        <div class="collage-item color9" data-aspect="1.5"></div>
        <div class="collage-item color10" data-aspect="1.0"></div>
        <div class="collage-item color1" data-aspect="1.6"></div>
        <div class="collage-item color2" data-aspect="0.8"></div>
        <div class="collage-item color3" data-aspect="1.9"></div>
        <div class="collage-item color4" data-aspect="0.6"></div>
        <div class="collage-item color5" data-aspect="1.2"></div>
        <div class="collage-item color6" data-aspect="1.0"></div>
        <div class="collage-item color7" data-aspect="1.3"></div>
        <div class="collage-item color8" data-aspect="1.5"></div>
        <div class="collage-item color9" data-aspect="0.9"></div>
        <div class="collage-item color10" data-aspect="1.8"></div>
      </div>
    </section>

    <section
      class="collage-outro text-center text-light d-flex flex-column justify-content-center align-items-center"
    >
      <img
        src="public/assets/logo.webp"
        alt="Aham Logo"
        class="outro-logo mb-3"
      />
      <h2 class="fw-bold">Your Vision, Our Commitment</h2>
      <p class="lead">Let's build the future — together.</p>
      <a
        href="contact_us.html"
        class="btn btn-brand-warning fw-bold px-4 py-2 mt-3"
        >Contact Us</a
      >
    </section>
    <!-- Collage Scroll Section -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="public/js/cenematic_scroll.js"></script>
  </body>
</html>
