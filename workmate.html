<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workmate — Coming Soon</title>

    <!-- Workmate Construction Theme -->
    <style>
      :root {
        --color-brand-primary: #f5c400; /* Construction Yellow */
        --color-brand-dark: #1e1e1e; /* Charcoal Black */
        --color-bg-dark: #121212;
        --color-text-light: #f5f5f5;
        --color-text-muted: #bdbdbd;
      }

      body {
        margin: 0;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        background: linear-gradient(
            135deg,
            rgba(0, 0, 0, 0.85),
            rgba(30, 30, 30, 0.85),
            rgba(0, 0, 0, 0.9)
          ),
          url("public/assets/coming_soon_bg.webp") center/cover no-repeat;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: var(--color-text-light);
      }

      .box {
        max-width: 620px;
        padding: 2.8rem 2.2rem;
        border-radius: 14px;
        background: rgba(18, 18, 18, 0.75);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(245, 196, 0, 0.25);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      }

      .logo {
        width: 72px;
        height: 72px;
        border-radius: 10px;
        margin-bottom: 1.2rem;
        background: #000;
        padding: 8px;
      }

      h1 {
        font-size: 2.8rem;
        margin-bottom: 0.6rem;
        font-weight: 800;
        letter-spacing: 1px;
        color: var(--color-brand-primary);
      }

      p {
        color: var(--color-text-muted);
        font-size: 1.05rem;
        margin-bottom: 1.8rem;
        line-height: 1.6;
      }

      .btn-back {
        display: inline-block;
        background: var(--color-brand-primary);
        color: var(--color-brand-dark);
        padding: 0.85rem 1.8rem;
        border-radius: 6px;
        text-decoration: none;
        font-weight: 700;
        letter-spacing: 0.4px;
        transition: transform 0.25s ease, box-shadow 0.25s ease,
          background 0.25s ease;
      }

      .btn-back:hover {
        background: #ffd633;
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(245, 196, 0, 0.4);
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 2.2rem;
        }
        .box {
          padding: 2.2rem 1.6rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="box">
      <img src="public/assets/logo.webp" alt="Workmate Logo" class="logo" />
      <h1>Workmate</h1>
      <p>We're building something exciting. Stay tuned!</p>

      <a href="index.html" class="btn-back">
        ← Back to AHAM INVESTMENTS CO. LTD
      </a>
    </div>
  </body>
</html>
